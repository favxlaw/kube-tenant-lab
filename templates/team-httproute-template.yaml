apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: <team-name>-route
  namespace: <team-namespace>
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /<team-name>
      backendRefs:
        - name: <service-name>
          namespace: <team-namespace>
          port: 80
