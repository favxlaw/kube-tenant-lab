apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: scheduling-guardrail
  annotations:
    policies.kyverno.io/title: Workload Scheduling Guardrail
    policies.kyverno.io/description: >-
      Workloads must only target nodes belonging to their own team.
      Enforcement is based on the namespace team label, not the
      namespace name. Any namespace with a team label is covered
      automatically. A pod targeting a node with a different team
      role than its namespace team label is rejected.
spec:
  validationFailureAction: Enforce
  rules:
    - name: node-selector-must-match-namespace-team
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: team
                    operator: Exists
      preconditions:
        all:
          - key: "{{ request.object.spec.nodeSelector.role || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Pod '{{ request.object.metadata.name }}' is targeting node
          role '{{ request.object.spec.nodeSelector.role }}' but its
          namespace belongs to team
          '{{ request.object.metadata.labels.team || request.namespace.metadata.labels.team }}'.
          Workloads must only target their own team nodes.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.nodeSelector.role }}"
                operator: NotEquals
                value: "{{ request.namespaceObject.metadata.labels.team }}"
