apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: scheduling-guardrail
  annotations:
    policies.kyverno.io/title: Workload Scheduling Guardrail
    policies.kyverno.io/description: >-
      Workloads must only target nodes belonging to their own team.
      Platform namespaces are excluded.
spec:
  validationFailureAction: Enforce
  rules:
    - name: node-selector-must-match-namespace-team
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: team
                    operator: Exists
      exclude:
        any:
          - resources:
              namespaceSelector:
                matchLabels:
                  team: platform
      context:
        - name: namespaceTeam
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.namespace }}"
            jmesPath: "metadata.labels.team"
      preconditions:
        all:
          - key: "{{ request.object.spec.nodeSelector.role || '' }}"
            operator: NotEquals
            value: ""
          - key: "{{ namespaceTeam }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Pod '{{ request.object.metadata.name }}' is targeting node
          role '{{ request.object.spec.nodeSelector.role }}' but its
          namespace belongs to team '{{ namespaceTeam }}'.
          Workloads must only target their own team nodes.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.nodeSelector.role }}"
                operator: NotEquals
                value: "{{ namespaceTeam }}"
