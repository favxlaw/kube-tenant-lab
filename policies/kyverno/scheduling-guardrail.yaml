apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: scheduling-guardrail
  annotations:
    policies.kyverno.io/title: Workload Scheduling Guardrail
    policies.kyverno.io/description: >-
      Workloads in team-a namespaces must not target team-b nodes
      and vice versa. Prevents cross-team node targeting which
      would break workload isolation guarantees.
spec:
  validationFailureAction: Enforce
  rules:
    - name: team-a-cannot-target-team-b
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - team-a-demo
      validate:
        message: >-
          Workloads in team-a-demo must not target team-b nodes.
          nodeSelector.role must be team-a or omitted.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.nodeSelector.role \
                  | default('', @) }}"
                operator: Equals
                value: team-b
    - name: team-b-cannot-target-team-a
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - team-b-demo
      validate:
        message: >-
          Workloads in team-b-demo must not target team-a nodes.
          nodeSelector.role must be team-b or omitted.
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.nodeSelector.role \
                  | default('', @) }}"
                operator: Equals
                value: team-a