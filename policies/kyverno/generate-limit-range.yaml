apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-team-limit-range
  annotations:
    policies.kyverno.io/title: Generate LimitRange for Team Namespaces
    policies.kyverno.io/description: >-
      Automatically creates a LimitRange in every namespace with a
      team label. Sets default resource requests and limits on all
      containers that do not declare them explicitly. Prevents
      unbounded resource consumption by individual containers and
      ensures ResourceQuota enforcement works correctly.
spec:
  rules:
    - name: generate-limit-range
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchExpressions:
                  - key: team
                    operator: Exists
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  team: platform
      generate:
        apiVersion: v1
        kind: LimitRange
        name: team-limit-range
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          spec:
            limits:
              - type: Container
                default:
                  cpu: "200m"
                  memory: "128Mi"
                defaultRequest:
                  cpu: "50m"
                  memory: "64Mi"
                max:
                  cpu: "500m"
                  memory: "512Mi"
                min:
                  cpu: "10m"
                  memory: "16Mi"
              - type: Pod
                max:
                  cpu: "1"
                  memory: "1Gi"
