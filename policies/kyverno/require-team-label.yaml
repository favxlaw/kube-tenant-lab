apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-team-label
  annotations:
    policies.kyverno.io/title: Require Team Label on Namespaces
    policies.kyverno.io/description: >-
      All non-system namespaces must declare a team label
      identifying the owning team. System namespaces are
      excluded by checking for the kubernetes.io/metadata.name
      label pattern used by system components.
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-team-label
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              selector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - kube-system
                      - kube-public
                      - kube-node-lease
                      - kyverno
                      - local-path-storage
      validate:
        message: >-
          Namespace '{{ request.object.metadata.name }}' is missing
          a required 'team' label. Add metadata.labels.team to
          identify the owning team.
        pattern:
          metadata:
            labels:
              team: "?*"
