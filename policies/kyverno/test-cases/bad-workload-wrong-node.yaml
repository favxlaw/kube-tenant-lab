apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
  namespace: team-a-demo
spec:
  nodeSelector:
    role: team-b
  containers:
    - name: app
      image: hashicorp/http-echo:latest
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop: ["ALL"]
