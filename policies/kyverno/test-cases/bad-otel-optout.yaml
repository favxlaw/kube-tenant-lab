apiVersion: v1
kind: Pod
metadata:
  name: logging-escape-attempt
  namespace: team-a-demo
  annotations:
    opentelemetry.io/exclude-logs: "true"
spec:
  containers:
    - name: app
      image: hashicorp/http-echo:latest
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop: ["ALL"]
