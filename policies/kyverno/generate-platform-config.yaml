apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-platform-config
  annotations:
    policies.kyverno.io/title: Generate Platform ConfigMap for Team Namespaces
    policies.kyverno.io/description: >-
      Automatically creates a ConfigMap containing platform metadata
      in every new team namespace. Used for auditing, tooling, and
      platform version tracking across all tenant namespaces.
spec:
  rules:
    - name: generate-platform-config
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchExpressions:
                  - key: team
                    operator: Exists
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  team: platform
      generate:
        apiVersion: v1
        kind: ConfigMap
        name: platform-config
        namespace: "{{ request.object.metadata.name }}"
        synchronize: true
        data:
          data:
            team: "{{ request.object.metadata.labels.team }}"
            managed-by: kube-tenant-lab
            network-policy: default-deny
            resource-quota: enforced
            limit-range: enforced
            observability: enabled
