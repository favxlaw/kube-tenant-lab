apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-otel-optout
  annotations:
    policies.kyverno.io/title: Block OpenTelemetry Log Opt-Out
    policies.kyverno.io/description: >-
      Prevents any Pod or Namespace from opting out of
      OpenTelemetry log collection.
spec:
  validationFailureAction: Enforce
  rules:
    - name: block-pod-otel-optout
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: team
                    operator: Exists
      exclude:
        any:
          - resources:
              namespaceSelector:
                matchLabels:
                  team: platform
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Pod '{{ request.object.metadata.name }}' in namespace
          '{{ request.object.metadata.namespace }}' has
          opentelemetry.io/exclude-logs set to true. Opting out
          of log collection is not permitted on this platform.
        pattern:
          metadata:
            annotations:
              =(opentelemetry.io/exclude-logs): "!true"
    - name: block-namespace-otel-optout
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchExpressions:
                  - key: team
                    operator: Exists
      exclude:
        any:
          - resources:
              selector:
                matchLabels:
                  team: platform
      preconditions:
        all:
          - key: "{{ request.object.metadata.annotations || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Namespace '{{ request.object.metadata.name }}' has
          opentelemetry.io/exclude-logs set to true. Opting out
          of log collection is not permitted on this platform.
        pattern:
          metadata:
            annotations:
              =(opentelemetry.io/exclude-logs): "!true"
