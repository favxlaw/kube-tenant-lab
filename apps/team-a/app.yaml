apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-a-app
  namespace: team-a-demo
  labels:
    app: team-a-app
    team: team-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-a-app
  template:
    metadata:
      labels:
        app: team-a-app
        team: team-a
    spec:
      nodeSelector:
        role: team-a
      tolerations:
        - key: "team"
          operator: "Equal"
          value: "team-a"
          effect: "NoSchedule"
      containers:
        - name: app
          image: hashicorp/http-echo:latest
          args:
            - "-text=hello from team-a"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: team-a-svc
  namespace: team-a-demo
  labels:
    app: team-a-app
    team: team-a
spec:
  selector:
    app: team-a-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP