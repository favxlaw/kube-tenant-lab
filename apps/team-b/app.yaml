apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-b-app
  namespace: team-b-demo
  labels:
    app: team-b-app
    team: team-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-b-app
  template:
    metadata:
      labels:
        app: team-b-app
        team: team-b
      annotations: {}
    spec:
      serviceAccountName: team-app
      nodeSelector:
        role: team-b
      tolerations:
        - key: "team"
          operator: "Equal"
          value: "team-b"
          effect: "NoSchedule"
      containers:
        - name: app
          image: tenant-app:v1
          imagePullPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          env:
            - name: TEAM_NAME
              value: "team-b"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORT
              value: "8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.team-b-demo.svc.cluster.local:4317"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: team-b-svc
  namespace: team-b-demo
  labels:
    app: team-b-app
    team: team-b
spec:
  selector:
    app: team-b-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP