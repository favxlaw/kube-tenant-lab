apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-team-b-config
  namespace: platform-observability
  labels:
    team: platform
    tenant: team-b
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/team-b-demo_*/*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: json_parser
            if: 'body matches "^\\{"'
          - type: move
            from: attributes["log.file.path"]
            to: resource["log.file.path"]
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      resource:
        attributes:
          - key: team
            value: team-b
            action: insert
          - key: namespace
            value: team-b-demo
            action: insert
          - key: platform
            value: kube-tenant-lab
            action: insert
      batch:
        timeout: 5s
        send_batch_size: 1000
    exporters:
      otlp:
        endpoint: otel-gateway.platform-observability.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [resource, batch]
          exporters: [otlp]
        traces:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp]
        metrics:
          receivers: [otlp]
          processors: [resource, batch]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-team-b
  namespace: platform-observability
  labels:
    app: otel-collector-team-b
    team: platform
    tenant: team-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector-team-b
  template:
    metadata:
      labels:
        app: otel-collector-team-b
        team: platform
        tenant: team-b
      annotations: {}
    spec:
      serviceAccountName: otel-collector
      nodeSelector:
        role: team-b
      tolerations:
        - key: "team"
          operator: "Equal"
          value: "team-b"
          effect: "NoSchedule"
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/conf/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /conf
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: otel-collector-team-b-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-team-b
  namespace: platform-observability
  labels:
    app: otel-collector-team-b
    team: platform
    tenant: team-b
spec:
  selector:
    app: otel-collector-team-b
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
  type: ClusterIP
